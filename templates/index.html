<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Summarizer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    textarea {
      width: 100%;
      min-height: 160px;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    }
    button {
      margin-top: 0.75rem;
      padding: 0.6rem 1.25rem;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: #0d6efd;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #0b5ed7; }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    #result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      background: #e8f4fd;
      border: 1px solid #b6d4fe;
      display: none;
    }
    #result.error {
      background: #f8d7da;
      border-color: #f1aeb5;
    }
    #result h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
    }
    #result p {
      margin: 0;
      white-space: pre-wrap;
    }
    .loading { color: #666; }
  </style>
</head>
<body>
  <h1>Text Summarizer</h1>
  <form id="form">
    <label for="text">Enter text to summarize</label>
    <textarea id="text" name="text" placeholder="Paste or type your text here..." required></textarea>
    <button type="submit" id="btn">Summarize</button>
  </form>
  <div id="result"></div>

  <script>
    const form = document.getElementById("form");
    const textArea = document.getElementById("text");
    const btn = document.getElementById("btn");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = textArea.value.trim();
      if (!text) return;

      btn.disabled = true;
      resultDiv.style.display = "block";
      resultDiv.className = "";
      resultDiv.innerHTML = "<p class='loading'>Summarizing…</p>";

      try {
        const res = await fetch("/summarize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();

        if (!res.ok) {
          resultDiv.classList.add("error");
          resultDiv.innerHTML = "<h2>Error</h2><p>" + (data.error || "Something went wrong.") + "</p>";
          return;
        }
        resultDiv.innerHTML = "<h2>Summary</h2><p>" + (data.summary || "(empty)") + "</p>";
      } catch (err) {
        resultDiv.classList.add("error");
        resultDiv.innerHTML = "<h2>Error</h2><p>" + err.message + "</p>";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
